<body onload="main_onload();" onblur="onLoseFocus()">
  <div id='oneLiner' style="position: fixed; color:black;  background-color:#dddddd; left: 0%; top: 0%; display: none;">
    <p id = "liner"></p>
  </div>
  <div id='tracingLog' style="position: fixed; color:black;  background-color:#dddddd; right: 0%; bottom: 0%; display: none;">
    <p id = "tracing"></p>
  </div>
  <div id="content">
    <!--   <img src="city_ref.png"> -->
    <canvas id="mycvs" width="483" height="470" style="background-color:black"></canvas>
    <br>
    <canvas id="chunkyShow" width="483" height="470" style="display:none; position:fixed; z-index:10; background-color:black"></canvas>
    <canvas id="chunkyDraw" width="483" height="470" style="display:none; position:fixed; z-index:10; background-color:black"></canvas>
    <canvas id="backBuffer" width="483" height="470" style="display:none;"></canvas>
    <br>
    <!-- <button onclick="if (play) play=false; else play = true;">></button> -->
    Zoom: <input type="range" min="100" max="200" value="100" class="slider" id="outpuResolution"
      onChange="onNewOutputResolution();" onInput="onNewOutputResolution();">
    Speed: <input type="range" min="0" max="100" value="100" class="slider" id="runningSpeed"
      onChange="onNewRunningSpeed();" onInput="onNewRunningSpeed();">
    <label for="layout">Layout</label>
    <select id="layout" name="layout" onchange="onLayout();">
      <option value="8">Large code window</option>
      <option value="6">Half code window</option>
      <option value="4">Small code window</option>
    </select>
    <br>
    <div style="color: #ff00ff;" id="errors" class="col_12"></div>
    <div class="col_12">
      <br>Jump to label: <input class="autocomplete" type="text" id="filterLabel" name="filterLabel" size="30"><br>
      <br><select name="labels" id="labels" onchange="focusOnLabel(getComboValue(this))"></select>
    </div>
    <div id="debugger-left" class="col_8" style="overflow:auto; max-height:768px;"></div>
    <div id="rightPane" class="col_4" style="overflow:auto; max-height:768px;">
      <div id="registersDump"></div>
      <center><canvas id="smallrender" width="338" height="329"></canvas></center>
      <div id="debugger-right"></div>
    </div>
    <div id="log" class="col_12"></div>
  </div style="display:none">
  <img id="atariMonitorImage" width=390 height=312 src="images/STMonitor.png" style="display:none">
  <img id="OCSMonitorImage" width=483 height=470 src="images/OCSMonitor.png" style="display:none">
  <div>

  </div>

  <!-- MODAL BOX -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p id="modalContent"></p>
      <center><button id="modalclose">OK</button></center>
    </div>
  </div>

  <!-- MOUSE COORD -->
  <div id = "mouseFollow" style = "display:none; position:fixed; z-index:10; background-color: #6B6B6B; color: white;">
    <span id="mouseCoordLabel">DANS TON CUL</span>
  </div>

  <!-- PAUSED -->
  <div id = "paused" style = "display:none; position:fixed; z-index:10; background-color: #FF0000; color: white;">
    <span><h2>PAUSED - Press P</h2></span>
  </div>

  <!-- TOOLBOX -->
  <div id="draggable" class="ui-widget-content" style="width: 30%; height: 50%; background-color: rgba(200, 200, 200, 0.8); display:none">
    <p>
      <center style="background-color: rgba(208, 151, 222, 0.8);"><b>Toolbox</b></center>
      <table id="toolbox_contents">
      </table>
      <br><span id ="tbox_watches" style = "display: none;">Watches:</span>
      <table id="toolboxbuttons">
        <tr>
          <td><button class="inset" onclick="TOOLS.Screenshot();"><i class="fa fa-camera"></i></button></td>
          <td onclick="TOOLS.Screenshot();">Take a screenshot</td>
        </tr>
        <tr>
          <td><button class="inset" onclick="DEBUGGER_showContext();"><i class="fa fa-map-marker"></i></button></td>
          <td onclick="DEBUGGER_showContext();">Where am I?</td>
        </tr>
        <tr>
          <td><button class="inset" onclick="TOOLBOX.CreateHWBreakpointWindow();"><i class="fa fa-minus-circle"></i></button></td>
          <td onclick="TOOLBOX.CreateHWBreakpointWindow();">Address Breakpoints</td>
        </tr>
      </table>
    </p>
  </div>

</body>

</html>
